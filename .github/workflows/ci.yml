name: ci

# Build the NIF and run the host-safe (non-device) test suite on every push/PR,
# across the supported version corners. Device-backed tests are tagged and
# excluded by default (test_helper.exs); they run inside the bodge_usb VM
# harness.

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  host-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Oldest supported pair (mix.exs floor) and current.
          - otp: "26"
            elixir: "1.17"
            lint: false
          - otp: "29"
            elixir: "1.20"
            lint: true
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          elixir-version: ${{ matrix.elixir }}

      - name: Restore deps + build cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-${{ matrix.otp }}-${{ matrix.elixir }}-

      - run: mix deps.get
      - run: mix compile --warnings-as-errors
      - run: mix test
      - if: ${{ matrix.lint }}
        run: mix format --check-formatted
      - if: ${{ matrix.lint }}
        run: mix credo --strict
      # PLTs land in _build, which the cache step above already covers: the
      # first run pays the PLT build, later runs take seconds.
      - if: ${{ matrix.lint }}
        run: mix dialyzer

  reuse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: fsfe/reuse-action@v5
