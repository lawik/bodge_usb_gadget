name: ci

# Build the NIF and run the host-safe (non-device) test suite on every push/PR.
# Device-backed tests are tagged and excluded by default (test_helper.exs); they
# run inside the bodge_usb VM harness.
#
# bodge_usb is checked out alongside because the device-backed tests depend on
# it (path dep, only: :test) and mix deps.get resolves it unconditionally.

on:
  push:
  pull_request:

permissions:
  contents: read

defaults:
  run:
    working-directory: bodge_usb_gadget

jobs:
  host-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: bodge_usb_gadget

      - uses: actions/checkout@v4
        with:
          repository: lawik/bodge_usb
          path: bodge_usb

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "29"
          elixir-version: "1.20"

      - name: Restore deps + build cache
        uses: actions/cache@v4
        with:
          path: |
            bodge_usb_gadget/deps
            bodge_usb_gadget/_build
          key: ${{ runner.os }}-mix-${{ hashFiles('bodge_usb_gadget/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - run: mix deps.get
      - run: mix compile --warnings-as-errors
      - run: mix format --check-formatted
      - run: mix credo --strict
      - run: mix test
      # PLTs land in _build, which the cache step above already covers: the
      # first run pays the PLT build, later runs take seconds.
      - run: mix dialyzer
